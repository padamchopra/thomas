name: Build macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing release tag to upload Conductor.dmg to"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Conductor.app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check CLI syntax
        run: npm run check

      - name: Build app bundle
        run: ./macos/ConductorMenu/build-app.sh

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - macos/ConductorMenu/.build/ConductorMenu.app

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 macos/ConductorMenu/.build/ConductorMenu.app

      - name: Create DMG
        run: |
          mkdir -p dmg-root
          ditto macos/ConductorMenu/.build/ConductorMenu.app dmg-root/Conductor.app
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "Conductor" -srcfolder dmg-root -ov -format UDZO Conductor.dmg

      - name: Attach app to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1
          then
            gh release upload "$TAG_NAME" Conductor.dmg --clobber
          else
            gh release create "$TAG_NAME" Conductor.dmg --title "$TAG_NAME" --notes "Conductor macOS menu app."
          fi
